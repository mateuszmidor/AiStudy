<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebNotesApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container-fluid p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3">WebNotesApp</h1>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createModal">
                Add Note
            </button>
        </div>
        
        <div id="notesBoard" class="row g-3">
            {{template "notes.html" .}}
        </div>
    </div>

    <div class="modal fade" id="createModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Create New Note</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="createForm">
                        <div class="mb-3">
                            <label for="noteTitle" class="form-label">Title *</label>
                            <input type="text" class="form-control" id="noteTitle" name="title" required>
                        </div>
                        <div class="mb-3">
                            <label for="noteContent" class="form-label">Content *</label>
                            <textarea class="form-control" id="noteContent" name="content" rows="5" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="noteTags" class="form-label">Tags (comma-separated)</label>
                            <input type="text" class="form-control" id="noteTags" name="tags" placeholder="work, important">
                        </div>
                        <div id="createError" class="alert alert-danger d-none"></div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="submitNote()">Create</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="viewModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="viewTitle"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p><strong>Created:</strong> <span id="viewCreated"></span></p>
                    <p><strong>Updated:</strong> <span id="viewUpdated"></span></p>
                    <p id="viewTagsContainer"><strong>Tags:</strong> <span id="viewTags"></span></p>
                    <hr>
                    <pre id="viewContent" class="bg-light p-3 rounded"></pre>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
